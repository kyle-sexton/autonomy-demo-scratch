name: gate

# Deterministic gate on every PR: judgment-free, model-free, no network beyond
# the actions checkout. Three deterministic steps — ShellCheck, a pure-bash
# behavioural test runner exercising the drain scripts (tools/autonomy-demo/tests,
# jq + coreutils + git only, no installs/network/duckdb), and a JSON/JSONL validity
# sweep. The check-run this job publishes (name: deterministic-gate) is the
# independent gate surface verify-join.sh reads via the check-run API — the agent
# never writes its own gate result. Check-name coupling: the job name here MUST
# equal DRAIN_GATE_CHECK_NAME in tools/autonomy-demo/drain-common.sh.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-gate:
    name: deterministic-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # shellcheck and jq are preinstalled on the GitHub-hosted ubuntu image.
      # Scope is the project-owned scripts (entrypoints + the test runner); the
      # vendored work-item-tracker tree is upstream-synced (its own repo owns its
      # lint policy), so it is not gated here.
      - name: ShellCheck (project scripts)
        run: shellcheck -x tools/autonomy-demo/*.sh tools/autonomy-demo/tests/*.sh

      # Behavioural substance beyond lint: the real candidate-eligibility filter,
      # the CR-stripping regression, revert detection, and pure helpers.
      - name: Drain behavioural tests
        run: bash tools/autonomy-demo/tests/run-tests.sh

      - name: JSON / JSONL validity sweep (tracked config)
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            if ! jq empty "$f" >/dev/null 2>&1; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(git ls-files '*.json')
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            n=0
            while IFS= read -r line; do
              n=$((n + 1))
              [ -n "$line" ] || continue
              if ! printf '%s' "$line" | jq empty >/dev/null 2>&1; then
                echo "::error file=$f,line=$n::invalid JSONL"
                fail=1
              fi
            done < "$f"
          done < <(git ls-files '*.jsonl')
          exit "$fail"
